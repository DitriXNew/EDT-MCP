name: E2E Tests

# Black-box e2e gate on a STOCK GitHub-hosted runner (ubuntu-latest): no docker
# image, no self-hosted runner. The `build` job builds the plugin once; the `e2e`
# job boots a headless EDT via ./.github/actions/setup-edt, which force-starts the
# MCP server (EDT_MCP_AUTO_START) and imports the TestConfiguration fixtures into
# an empty workspace by reference (EDT_MCP_IMPORT_PROJECTS — the plugin's headless
# bootstrap), then runs the suite against the local :8765.
#
# Scope: the suite skips the live-infobase round-trip (requires_live_infobase) by
# default, so it needs NO licensed 1C platform — EDT indexes the project model
# without one. The skipped runtime tools (YAXUnit run / debug / update_database)
# stay covered in the local / licensed dev loop.
#
# Runs a MATRIX over EDT versions (2025.2 + 2026.1), fail-fast off so each reports
# independently. setup-edt CACHES the Eclipse+EDT base per version (the slow, rate-
# limited p2 install), then overlays the freshly-built plugin each run — so a cache
# hit skips the upstream edt.1c.ru download entirely. The workspace index itself is
# NOT cached (fresh import every run), so run_all waits up to E2E_PROJECT_READY_TIMEOUT
# for indexing before aborting with one clear error.
#
# NOTE: the EDT log is uploaded per matrix entry for diagnosis. Dispatch-only (a full
# run boots EDT + indexes the config — heavier than conformance).

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Cache Tycho P2 repositories
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository/.cache/tycho
            ~/.m2/repository/p2
          key: ${{ runner.os }}-tycho-p2-${{ hashFiles('**/pom.xml', '**/*.target') }}
          restore-keys: |
            ${{ runner.os }}-tycho-p2-

      - name: Build the MCP plugin (p2 repository)
        working-directory: mcp
        env:
          MAVEN_OPTS: -Xmx2g -XX:+UseParallelGC
        run: mvn clean verify --batch-mode --no-transfer-progress -T 1C -DskipTests

      - name: Upload plugin p2 repository
        uses: actions/upload-artifact@v7
        with:
          name: mcp-plugin-p2
          path: mcp/repositories/com.ditrix.edt.mcp.server.repository/target/repository
          if-no-files-found: error

  e2e:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        edt: ["2025.2", "2026.1"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download plugin p2 repository
        uses: actions/download-artifact@v8
        with:
          name: mcp-plugin-p2
          path: plugin-p2

      - name: Set up headless EDT ${{ matrix.edt }} + MCP server (import the fixtures)
        uses: ./.github/actions/setup-edt
        with:
          plugin-repo: plugin-p2
          edt-p2: "https://edt.1c.ru/downloads/releases/ruby/${{ matrix.edt }}/"
          import-projects: "${{ github.workspace }}/tests/TestConfiguration:${{ github.workspace }}/tests/tests"

      - name: Run E2E tests
        env:
          # Cold cloud runner indexes the whole config from scratch (the EDT INSTALL is
          # cached, the workspace index is not), so give readiness a generous ceiling
          # before run_all aborts with a single clear error.
          E2E_PROJECT_READY_TIMEOUT: "1200"
        run: |
          python tests/e2e/run_all.py \
            --project TestConfiguration \
            --junit-xml tests/e2e/e2e-results.xml

      - name: Publish E2E Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        continue-on-error: true
        with:
          check_name: "E2E Test Results (EDT ${{ matrix.edt }})"
          files: tests/e2e/e2e-results.xml

      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-test-results-${{ matrix.edt }}
          path: tests/e2e/e2e-results.xml
          if-no-files-found: ignore

      - name: Upload EDT log
        if: ${{ always() && env.edt_log != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-edt-log-${{ matrix.edt }}
          path: ${{ env.edt_log }}
          if-no-files-found: ignore

      - name: Stop EDT
        if: always()
        run: kill "${edt_pid:-0}" 2>/dev/null || true
