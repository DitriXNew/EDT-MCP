name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      mcp_host:
        description: "MCP server host"
        required: false
        default: "localhost"
      mcp_port:
        description: "MCP server port"
        required: false
        default: "8765"
      project_name:
        description: "EDT project name for testing"
        required: false
        default: "TestConfiguration"

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    # E2E tests run against a live EDT with the MCP plugin and the TestConfiguration
    # project open. Booting EDT itself on a stock GitHub-hosted runner is solved by
    # ./.github/actions/setup-edt (see conformance.yml), but the e2e suite ALSO needs
    # (a) the test project imported into the EDT workspace and (b) a licensed
    # 1C:Enterprise platform for the infobase-dependent tools (YAXUnit / debug /
    # update_database) — neither is available on a public cloud runner. So this gate
    # is dispatched against an environment that provides both: the local dev loop or a
    # licensed runner (set mcp_host/mcp_port to the live server). The protocol-only
    # conformance gate is the one that runs unattended on a GitHub-hosted runner.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for MCP server
        env:
          MCP_HOST: ${{ github.event.inputs.mcp_host }}
          MCP_PORT: ${{ github.event.inputs.mcp_port }}
        run: |
          echo "Checking MCP server at $MCP_HOST:$MCP_PORT ..."
          for i in $(seq 1 30); do
            if curl -sf "http://$MCP_HOST:$MCP_PORT/health" > /dev/null 2>&1; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done
          echo "ERROR: MCP server not available"
          exit 1

      - name: Run E2E tests
        env:
          MCP_HOST: ${{ github.event.inputs.mcp_host }}
          MCP_PORT: ${{ github.event.inputs.mcp_port }}
          MCP_PROJECT: ${{ github.event.inputs.project_name }}
        run: |
          python tests/e2e/run_all.py \
            --host "$MCP_HOST" \
            --port "$MCP_PORT" \
            --project "$MCP_PROJECT" \
            --junit-xml tests/e2e/e2e-results.xml

      - name: Publish E2E Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        continue-on-error: true
        with:
          files: tests/e2e/e2e-results.xml

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: tests/e2e/e2e-results.xml
